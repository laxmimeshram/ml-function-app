name: Deploy Python Function App

on:
  push:
    branches:
      - main

jobs:
  # 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Archive files
      run: zip -r app.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: functionapp
        path: app.zip

  # 🔹 Stage 2: Deploy
  deploy:
    runs-on: ubuntu-latest   # ✅ fixed indentation
    needs: build             # ✅ fixed indentation

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: functionapp

    - name: Unzip artifact
      run: unzip app.zip

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Functions
      uses: Azure/functions-action@v1
      with:
        app-name: function-app-1
        package: .
